#Console Appender
log4j.appender.ConsoleAppender=org.apache.log4j.ConsoleAppender
log4j.appender.ConsoleAppender.layout=org.apache.log4j.PatternLayout
log4j.appender.ConsoleAppender.layout.ConversionPattern=%d{dd.MM.yyyy HH:mm:ss.SSS} [%-5p] %c - %m%n
#File Appender
log4j.appender.FileAppender=org.apache.log4j.RollingFileAppender
log4j.appender.FileAppender.file=./ITSQ-TestFaelle-Java.log
log4j.appender.FileAppender.MaxFileSize=2048KB
log4j.appender.FileAppender.MaxBackupIndex=10
log4j.appender.FileAppender.layout=org.apache.log4j.PatternLayout
log4j.appender.FileAppender.layout.ConversionPattern=%d{dd.MM.yyyy HH:mm:ss.SSS} [%-5p] %c - %m%n

#TimeLine Appender
log4j.appender.TimeLineAppender=org.apache.log4j.RollingFileAppender
log4j.appender.TimeLineAppender.name=TimeLineAppender
log4j.appender.TimeLineAppender.MaxFileSize=2048KB
log4j.appender.TimeLineAppender.MaxBackupIndex=10
log4j.appender.TimeLineAppender.layout=org.apache.log4j.PatternLayout
log4j.appender.TimeLineAppender.layout.ConversionPattern=%d{dd.MM.yyyy HH:mm:ss.SSS} [%-5p] %m%n

log4j.rootLogger=INFO, FileAppender, ConsoleAppender, TimeLineAppender
